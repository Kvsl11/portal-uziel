    <!-- Persistência de Tema (Prevenção de FOUC) -->
    <script>
      (function() {
        try {
          const localTheme = localStorage.getItem('theme');
          const html = document.documentElement;
          
          // Lógica estrita: Só ativa dark se estiver explicitamente salvo como 'dark'.
          // Caso contrário (null ou 'light'), força a remoção da classe dark.
          if (localTheme === 'dark') {
            html.classList.add('dark');
          } else {
            html.classList.remove('dark');
          }
        } catch (e) {
          console.error("Theme init error", e);
        }
      })();
    </script>

    <style type="text/tailwindcss">
      :root { color-scheme: light; }
      .dark { color-scheme: dark; }

      html, body {
        width: 100%;
        overflow-x: hidden; 
        position: relative;
        overscroll-behavior-y: none;
        background-color: #ffffff;
      }
      .dark body { background-color: #0f172a; }

      *, *::before, *::after {
        transition-property: background-color, border-color, color, opacity, transform, box-shadow;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        transition-duration: 500ms;
      }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { 
        background: rgba(41, 170, 226, 0.2); 
        border-radius: 99px; 
      }
      .dark ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); }
      
      .card-walking-border {
        @apply relative overflow-hidden bg-white dark:bg-[#0f172a];
      }
      
      .card-walking-border::before {
        content: '';
        @apply absolute inset-[-150%] opacity-0 transition-opacity duration-700 pointer-events-none;
        background: conic-gradient(from 0deg, transparent, #29aae2, transparent, #38bdf8, transparent);
        animation: spin-slow 8s linear infinite;
        z-index: 1;
      }
      
      .card-walking-border:hover::before {
        @apply opacity-30 md:opacity-50;
      }

      .card-walking-border-mask {
        @apply absolute inset-[1px] rounded-[calc(2rem-1px)] bg-white dark:bg-[#0f172a] z-[2];
      }
      
      .card-content-wrapper {
        @apply relative z-[3];
      }

      .glass-panel { 
        background: rgba(255, 255, 255, 0.7); 
        backdrop-filter: blur(20px) saturate(180%); 
        border: 1px solid rgba(255, 255, 255, 0.5); 
      }
      .dark .glass-panel { 
        background: rgba(15, 23, 42, 0.8); 
        border: 1px solid rgba(255, 255, 255, 0.05); 
      }

      .input-premium {
